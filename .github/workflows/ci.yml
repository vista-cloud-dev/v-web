name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # m/v waterline gate — v-web is layer v (passes G1 trivially: v -> m is
  # allowed). The reusable org workflow runs `m arch check`.
  arch:
    uses: vista-cloud-dev/.github/.github/workflows/arch-waterline.yml@main

  # The registry-driven drift gates + the cross-repo MSL seam-contract pin
  # (pure-Python, engine-free — no `m` binary, no engine, no sibling checkouts).
  #   check-msl-pin SKIPs green in CI (sibling m-stdlib not checked out).
  # NOT in CI (run locally via `make check-fast` / `make test`):
  #   - fmt-check / lint — the Makefile `M` defaults to a local path the CI
  #     runner doesn't have (same posture as v-stdlib); the PostToolUse fmt hook
  #     + `make check-fast` cover them at dev time.
  #   - check-kids — needs the v-pkg binary (absent in CI).
  #   - the engine-bound suite (`test`) — v-web stages m-stdlib + v-stdlib /src
  #     via --routines, which CI does not check out; verified locally over the
  #     driver stack (m test --docker m-test-engine / m-test-iris), dual-engine.
  ci:
    uses: vista-cloud-dev/.github/.github/workflows/m-ci.yml@main
    with:
      engine-free-targets: "check-seams check-icr check-citations check-namespaces check-msl-pin check-engine-access"
      engine-targets: ""
